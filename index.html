<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>monoboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css" />
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">M</div>
      <span class="header-title">monoboards</span>
      <span class="header-badge" id="headerBadge"></span>
    </div>
    <div class="header-actions">
      <div class="lang-wrap">
        <button class="btn btn-ghost lang-btn" id="langBtn" onclick="toggleLangMenu(event)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span id="langLabel"></span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-item" id="lang-zh-TW" onclick="setLang('zh-TW')">繁體中文</button>
          <button class="lang-item" id="lang-zh-CN" onclick="setLang('zh-CN')">简体中文</button>
          <button class="lang-item" id="lang-en" onclick="setLang('en')">English</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="addProjectBtn">新增項目</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="grid" id="grid"></div>
  </main>
  <footer class="footer">
    <div>&copy; monoboards · <a href="https://image2pixel.app" style="color:var(--text-muted);text-decoration:none;">image2pixel.app</a></div>
    <div class="footer-links">
      <a href="privacy.html" id="footerPrivacy">隱私協議</a>
      <a href="terms.html" id="footerTerms">使用協議</a>
    </div>
  </footer>
</div>

<div class="overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新增項目</div>
    <label class="form-label" id="modalLabel">項目名稱</label>
    <input class="form-input" id="newName" placeholder="例如：網站改版、Q3 計劃…" maxlength="80"
      onkeydown="if(event.key==='Enter')confirmModal()" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalCreate" onclick="confirmModal()">建立</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<button type="button" class="archive-fab" id="archiveFab" onclick="toggleBoardArchiveView()" aria-label="Archive"></button>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
