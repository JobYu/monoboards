<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>monoboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e1118;
      --surface: #161922;
      --surface2: #1e2230;
      --surface3: #272c3f;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.11);
      --text: #e4e7f5;
      --text-muted: #6e779a;
      --text-dim: #3d4464;
      --accent: #6a8df5;
      --accent-soft: rgba(106,141,245,0.14);
      --accent-glow: rgba(106,141,245,0.35);
      --green: #3ecf72;
      --red: #f06b6b;
      --red-soft: rgba(240,107,107,0.12);
      --radius: 14px;
      --radius-sm: 9px;
      --radius-xs: 6px;
      --shadow: 0 2px 16px rgba(0,0,0,0.35);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.55);
    }
    html, body { min-height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .header { position: sticky; top: 0; z-index: 50; background: rgba(14,17,24,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #6a8df5 0%, #a07cf8 100%); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.5px; flex-shrink: 0; }
    .header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
    .header-badge { font-size: 11px; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border2); padding: 2px 9px; border-radius: 100px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s ease; white-space: nowrap; font-family: inherit; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.12); box-shadow: 0 4px 14px var(--accent-glow); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .icon-btn { width: 28px; height: 28px; border-radius: var(--radius-xs); background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: all 0.13s ease; flex-shrink: 0; }
    .icon-btn:hover { background: var(--surface3); color: var(--text-muted); }
    .icon-btn.del:hover { background: var(--red-soft); color: var(--red); }
    .lang-wrap { position: relative; }
    .lang-btn { gap: 4px; padding: 6px 10px; font-size: 12px; }
    .lang-menu { position: absolute; right: 0; top: 38px; z-index: 60; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); min-width: 130px; padding: 6px; display: none; }
    .lang-menu.open { display: block; }
    .lang-item { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: transparent; border: none; color: var(--text); cursor: pointer; font-family: inherit; font-size: 13px; text-align: left; }
    .lang-item:hover { background: var(--surface2); }
    .lang-item.active { color: var(--accent); }
    .main { flex: 1; padding: 24px 18px 24px 24px; overflow-x: auto; }
    .grid { display: flex; gap: 18px; align-items: flex-start; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; padding-bottom: 8px; scroll-snap-type: x proximity; width: max-content; min-width: 100%; }
    .empty { min-width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 20px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 4px; opacity: 0.5; }
    .empty h2 { font-size: 17px; font-weight: 600; }
    .empty p { font-size: 13px; color: var(--text-muted); max-width: 280px; line-height: 1.6; }
    .card { width: 350px; flex: 0 0 350px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; transition: border-color 0.2s, box-shadow 0.2s; scroll-snap-align: start; }
    .card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
    .card.dragging { opacity: 0.55; transform: scale(0.98); }
    .card.drop-before { box-shadow: inset 3px 0 0 var(--accent); }
    .card.drop-after { box-shadow: inset -3px 0 0 var(--accent); }
    .card-accent { height: 3px; border-radius: var(--radius) var(--radius) 0 0; background: linear-gradient(90deg, var(--accent), #a07cf8); opacity: 0; transition: opacity 0.2s; }
    .card:hover .card-accent { opacity: 1; }
    .card-accent.full { opacity: 1; background: linear-gradient(90deg, var(--green), #34d39a); }
    .card-head { padding: 18px 18px 14px; display: flex; align-items: flex-start; gap: 10px; }
    .card-title-wrap { flex: 1; min-width: 0; }
    .card-name { font-size: 14px; font-weight: 600; color: var(--text); background: transparent; border: 1px solid transparent; border-radius: var(--radius-xs); padding: 2px 5px; margin: -2px -5px; width: 100%; outline: none; font-family: inherit; cursor: text; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: border-color 0.13s, background 0.13s; }
    .card-name:focus { border-color: var(--accent); background: var(--surface2); white-space: normal; overflow: visible; text-overflow: clip; }
    .card-name::placeholder { color: var(--text-dim); }
    .card-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; padding-left: 5px; }
    .card-actions { display: flex; gap: 2px; }
    .card-progress { padding: 0 18px 14px; }
    .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .prog-counts { font-size: 12px; color: var(--text-muted); }
    .prog-pct { font-size: 12px; font-weight: 600; color: var(--accent); }
    .prog-pct.done-all { color: var(--green); }
    .prog-track { height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #a07cf8); transition: width 0.35s cubic-bezier(0.4,0,0.2,1); }
    .prog-fill.done-all { background: linear-gradient(90deg, var(--green), #34d39a); }
    .divider { height: 1px; background: var(--border); margin: 0 18px; }
    .card-todos { padding: 12px 18px 0; display: flex; flex-direction: column; gap: 5px; }
    .todo-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-xs); background: transparent; border: 1px solid transparent; transition: background 0.12s, border-color 0.12s; }
    .todo-item:hover { background: var(--surface2); border-color: var(--border); }
    .cb { width: 17px; height: 17px; border-radius: 5px; flex-shrink: 0; border: 1.5px solid var(--border2); cursor: pointer; background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.13s ease; }
    .cb:hover { border-color: var(--accent); }
    .cb.on { background: var(--green); border-color: var(--green); }
    .cb.on::after { content: ''; width: 9px; height: 5.5px; border-left: 1.8px solid #0e1118; border-bottom: 1.8px solid #0e1118; transform: rotate(-45deg) translate(0.5px, -0.5px); display: block; }
    .todo-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.45; background: transparent; border: 1px solid transparent; border-radius: 4px; padding: 1px 4px; outline: none; font-family: inherit; cursor: text; word-break: break-word; transition: border-color 0.12s, background 0.12s; }
    .todo-text:focus { border-color: var(--accent); background: var(--surface2); }
    .todo-text.done { text-decoration: line-through; color: var(--text-dim); }
    .todo-del { opacity: 0; transition: opacity 0.12s; }
    .todo-item:hover .todo-del { opacity: 1; }
    .todo-empty { padding: 16px 10px; text-align: center; font-size: 12px; color: var(--text-dim); border: 1px dashed var(--border2); border-radius: var(--radius-xs); }
    .card-add { padding: 10px 18px 16px; display: flex; gap: 7px; align-items: center; }
    .add-input { flex: 1; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.13s; }
    .add-input::placeholder { color: var(--text-dim); }
    .add-input:focus { border-color: var(--accent); }
    .add-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); flex-shrink: 0; background: var(--accent-soft); border: 1px solid rgba(106,141,245,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--accent); transition: all 0.13s ease; }
    .add-btn:hover { background: var(--accent); color: #fff; }
    .add-card { background: transparent; border: 1.5px dashed var(--border2); border-radius: var(--radius); min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; cursor: pointer; color: var(--text-muted); font-size: 13px; font-weight: 500; transition: all 0.18s ease; width: 350px; flex: 0 0 350px; scroll-snap-align: start; }
    .add-card:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
    .add-card-icon { font-size: 22px; opacity: 0.7; }
    .more-wrap { position: relative; }
    .more-menu { position: absolute; right: 0; top: 34px; z-index: 20; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); min-width: 150px; padding: 6px; display: none; }
    .more-menu.open { display: block; }
    .more-item { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: transparent; border: none; color: var(--text); cursor: pointer; font-family: inherit; font-size: 13px; text-align: left; }
    .more-item:hover { background: var(--surface2); }
    .more-item.danger { color: var(--red); }
    .more-item.danger:hover { background: var(--red-soft); }
    .overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .overlay.hidden { display: none; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); width: 100%; max-width: 380px; padding: 26px; box-shadow: var(--shadow-lg); animation: popIn 0.18s cubic-bezier(0.34,1.3,0.64,1); }
    @keyframes popIn { from { opacity:0; transform:scale(0.94) translateY(8px); } to { opacity:1; transform:none; } }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .form-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 9px 13px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.13s; }
    .form-input::placeholder { color: var(--text-dim); }
    .form-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }
    .toasts { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 7px; }
    .toast { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 15px; font-size: 13px; display: flex; align-items: center; gap: 9px; box-shadow: var(--shadow); animation: slideIn 0.18s ease; }
    .toast.ok { border-color: rgba(62,207,114,0.25); }
    @keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:none; } }
    .footer { border-top: 1px solid var(--border); padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; gap: 8px; }
    .footer-links { display: flex; gap: 18px; }
    .footer-links a { color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .footer-links a:hover { color: var(--accent); }
    @media (max-width: 580px) { .header { padding: 0 16px; } .header-badge { display: none; } .main { padding: 14px; } .card, .add-card { width: 320px; flex-basis: 320px; } .footer { padding: 14px 16px; flex-direction: column; text-align: center; } }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">M</div>
      <span class="header-title">monoboards</span>
      <span class="header-badge" id="headerBadge"></span>
    </div>
    <div class="header-actions">
      <div class="lang-wrap">
        <button class="btn btn-ghost lang-btn" id="langBtn" onclick="toggleLangMenu(event)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span id="langLabel"></span>
        </button>
        <div class="lang-menu" id="langMenu">
          <button class="lang-item" id="lang-zh-TW" onclick="setLang('zh-TW')">繁體中文</button>
          <button class="lang-item" id="lang-zh-CN" onclick="setLang('zh-CN')">简体中文</button>
          <button class="lang-item" id="lang-en" onclick="setLang('en')">English</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="addProjectBtn">新增項目</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="grid" id="grid"></div>
  </main>
  <footer class="footer">
    <div>&copy; monoboards · <a href="https://image2pixel.app" style="color:var(--text-muted);text-decoration:none;">image2pixel.app</a></div>
    <div class="footer-links">
      <a href="privacy.html" id="footerPrivacy">隱私協議</a>
      <a href="terms.html" id="footerTerms">使用協議</a>
    </div>
  </footer>
</div>

<div class="overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新增項目</div>
    <label class="form-label" id="modalLabel">項目名稱</label>
    <input class="form-input" id="newName" placeholder="例如：網站改版、Q3 計劃…" maxlength="80"
      onkeydown="if(event.key==='Enter')confirmModal()" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalCreate" onclick="confirmModal()">建立</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const I18N = {
  'zh-TW': {
    addProject: '新增項目',
    newProject: '新增項目',
    projectName: '項目名稱',
    projectNamePlaceholder: '例如：網站改版、Q3 計劃…',
    cancel: '取消',
    create: '建立',
    projectsCount: '{0} 個項目',
    completedCount: '{0}/{1} 已完成',
    allDone: '全部完成 ✓',
    emptyTitle: '建立你的第一個項目',
    emptyDesc: '點擊右上角「新增項目」，然後直接在卡片上管理所有待辦事項。',
    emptyButton: '新增第一個項目',
    todoEmpty: '在下方輸入框新增待辦事項',
    addTodoPlaceholder: '新增待辦…',
    add: '新增',
    export: '導出',
    more: '更多',
    deleteProject: '刪除項目',
    deleteTodo: '刪除',
    confirmDeleteProject: '確定刪除這個項目？',
    toastProjectDeleted: '項目已刪除',
    toastProjectCreated: '項目已建立',
    toastNoProjects: '沒有項目可以導出',
    toastExported: '已導出 Markdown',
    toastProjectExported: '已導出該項目 Markdown',
    mdTitle: 'monoboards',
    mdExportedAt: '導出時間：',
    mdProgress: '進度：',
    mdNoTodos: '尚無待辦事項',
    privacy: '隱私協議',
    terms: '使用協議',
    dateLocale: 'zh-TW'
  },
  'zh-CN': {
    addProject: '新增项目',
    newProject: '新增项目',
    projectName: '项目名称',
    projectNamePlaceholder: '例如：网站改版、Q3 计划…',
    cancel: '取消',
    create: '创建',
    projectsCount: '{0} 个项目',
    completedCount: '{0}/{1} 已完成',
    allDone: '全部完成 ✓',
    emptyTitle: '建立你的第一个项目',
    emptyDesc: '点击右上角「新增项目」，然后直接在卡片上管理所有待办事项。',
    emptyButton: '新增第一个项目',
    todoEmpty: '在下方输入框新增待办事项',
    addTodoPlaceholder: '新增待办…',
    add: '新增',
    export: '导出',
    more: '更多',
    deleteProject: '删除项目',
    deleteTodo: '删除',
    confirmDeleteProject: '确定删除这个项目？',
    toastProjectDeleted: '项目已删除',
    toastProjectCreated: '项目已创建',
    toastNoProjects: '没有项目可以导出',
    toastExported: '已导出 Markdown',
    toastProjectExported: '已导出该项目 Markdown',
    mdTitle: 'monoboards',
    mdExportedAt: '导出时间：',
    mdProgress: '进度：',
    mdNoTodos: '暂无待办事项',
    privacy: '隐私协议',
    terms: '使用协议',
    dateLocale: 'zh-CN'
  },
  'en': {
    addProject: 'New Project',
    newProject: 'New Project',
    projectName: 'Project Name',
    projectNamePlaceholder: 'e.g. Website Redesign, Q3 Planning…',
    cancel: 'Cancel',
    create: 'Create',
    projectsCount: '{0} projects',
    completedCount: '{0}/{1} done',
    allDone: 'All Done ✓',
    emptyTitle: 'Create Your First Project',
    emptyDesc: 'Click "New Project" in the top right, then manage all tasks directly on the card.',
    emptyButton: 'Create First Project',
    todoEmpty: 'Add a task below',
    addTodoPlaceholder: 'Add a task…',
    add: 'Add',
    export: 'Export',
    more: 'More',
    deleteProject: 'Delete Project',
    deleteTodo: 'Delete',
    confirmDeleteProject: 'Are you sure you want to delete this project?',
    toastProjectDeleted: 'Project deleted',
    toastProjectCreated: 'Project created',
    toastNoProjects: 'No projects to export',
    toastExported: 'Exported Markdown',
    toastProjectExported: 'Project Markdown exported',
    mdTitle: 'monoboards',
    mdExportedAt: 'Exported at:',
    mdProgress: 'Progress:',
    mdNoTodos: 'No tasks yet',
    privacy: 'Privacy Policy',
    terms: 'Terms of Use',
    dateLocale: 'en-US'
  }
};

const LANG_NAMES = { 'zh-TW': '繁體中文', 'zh-CN': '简体中文', 'en': 'English' };

function detectLang() {
  const saved = localStorage.getItem('monoboards-lang');
  if (saved && I18N[saved]) return saved;
  const nav = navigator.language || navigator.userLanguage || 'zh-TW';
  if (nav.startsWith('zh-TW') || nav.startsWith('zh-HK')) return 'zh-TW';
  if (nav.startsWith('zh')) return 'zh-CN';
  if (nav.startsWith('en')) return 'en';
  return 'zh-TW';
}

let currentLang = detectLang();
document.documentElement.lang = currentLang === 'en' ? 'en' : currentLang;

function t(key, ...args) {
  let s = (I18N[currentLang] && I18N[currentLang][key]) || I18N['zh-TW'][key] || key;
  args.forEach((a, i) => { s = s.replace(new RegExp('\\{' + i + '\\}', 'g'), a); });
  return s;
}

function setLang(lang) {
  if (!I18N[lang]) return;
  currentLang = lang;
  localStorage.setItem('monoboards-lang', lang);
  document.documentElement.lang = lang === 'en' ? 'en' : lang;
  closeLangMenu();
  updateStaticText();
  render();
}

function toggleLangMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('langMenu');
  const isOpen = menu.classList.contains('open');
  closeMenus();
  if (!isOpen) menu.classList.add('open');
}

function closeLangMenu() {
  document.getElementById('langMenu').classList.remove('open');
}

function updateStaticText() {
  document.getElementById('langLabel').textContent = LANG_NAMES[currentLang];
  document.getElementById('addProjectBtn').textContent = t('addProject');
  document.getElementById('modalTitle').textContent = t('newProject');
  document.getElementById('modalLabel').textContent = t('projectName');
  document.getElementById('newName').placeholder = t('projectNamePlaceholder');
  document.getElementById('modalCancel').textContent = t('cancel');
  document.getElementById('modalCreate').textContent = t('create');
  document.getElementById('footerPrivacy').textContent = t('privacy');
  document.getElementById('footerTerms').textContent = t('terms');
  document.querySelectorAll('.lang-item').forEach(el => el.classList.remove('active'));
  document.getElementById('lang-' + currentLang).classList.add('active');
}

const KEY = 'kanban-v2';
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || { projects:[] }; } catch { return { projects:[] }; } }
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {} }
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
let state = load();

function sortedProjects() { return [...state.projects].sort((a, b) => (a.order ?? 0) - (b.order ?? 0)); }
function resequence() { state.projects.forEach((p, i) => p.order = i); }
function render() { renderGrid(); renderBadge(); }
function renderBadge() {
  const el = document.getElementById('headerBadge');
  const n = state.projects.length;
  if (!n) { el.textContent = ''; return; }
  const done = state.projects.reduce((s,p) => s + p.todos.filter(t=>t.done).length, 0);
  const total = state.projects.reduce((s,p) => s + p.todos.length, 0);
  el.textContent = t('projectsCount', n) + ' \u00b7 ' + t('completedCount', done, total);
}
function pct(p) { return p.todos.length ? Math.round(p.todos.filter(t=>t.done).length / p.todos.length * 100) : 0; }

function renderGrid() {
  const grid = document.getElementById('grid');
  const projects = sortedProjects();
  if (!projects.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">\ud83d\udccb</div>
        <h2>${escHtml(t('emptyTitle'))}</h2>
        <p>${escHtml(t('emptyDesc'))}</p>
        <button class="btn btn-primary" style="margin-top:4px" onclick="openModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          ${escHtml(t('emptyButton'))}
        </button>
      </div>`;
    return;
  }
  grid.innerHTML = projects.map(p => cardHtml(p)).join('') + addCardHtml();
  bindDrag();
}

function patchCard(pid) {
  const p = state.projects.find(x => x.id === pid);
  if (!p) { render(); return; }
  const el = document.getElementById('card-' + pid);
  if (!el) { render(); return; }
  el.outerHTML = cardHtml(p);
  renderBadge();
}

function closeMenus() {
  document.querySelectorAll('.more-menu.open').forEach(el => el.classList.remove('open'));
  closeLangMenu();
}

function bindDrag() {
  document.querySelectorAll('.card').forEach(card => {
    card.draggable = true;
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend', onDragEnd);
    card.addEventListener('dragover', onDragOver);
    card.addEventListener('dragleave', onDragLeave);
    card.addEventListener('drop', onDrop);
  });
}

function onDragStart(e) {
  const card = e.currentTarget;
  if (!card.id) return;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', card.id);
}

function onDragEnd() {
  document.querySelectorAll('.card.drop-before,.card.drop-after,.card.dragging').forEach(el => el.classList.remove('drop-before', 'drop-after', 'dragging'));
}

function onDragOver(e) {
  e.preventDefault();
  const target = e.currentTarget;
  if (!target.id || target.classList.contains('dragging')) return;
  const rect = target.getBoundingClientRect();
  const before = e.clientX < rect.left + rect.width / 2;
  target.classList.toggle('drop-before', before);
  target.classList.toggle('drop-after', !before);
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drop-before', 'drop-after');
}

function onDrop(e) {
  e.preventDefault();
  const sourceId = e.dataTransfer.getData('text/plain');
  const target = e.currentTarget;
  if (!sourceId || !target.id || sourceId === target.id) return;
  const sourceIndex = state.projects.findIndex(p => 'card-' + p.id === sourceId);
  const targetIndex = state.projects.findIndex(p => 'card-' + p.id === target.id);
  if (sourceIndex < 0 || targetIndex < 0) return;
  const [moved] = state.projects.splice(sourceIndex, 1);
  const insertIndex = sourceIndex < targetIndex && target.classList.contains('drop-after') ? targetIndex : targetIndex + (target.classList.contains('drop-after') ? 1 : 0);
  state.projects.splice(Math.max(0, Math.min(insertIndex, state.projects.length)), 0, moved);
  resequence();
  save();
  render();
}

function cardHtml(p) {
  const done = p.todos.filter(t=>t.done).length;
  const total = p.todos.length;
  const pp = pct(p);
  const full = total > 0 && done === total;
  const todos = p.todos.length
    ? p.todos.map(todo => `
      <div class="todo-item">
        <div class="cb ${todo.done?'on':''}" onclick="toggleTodo('${p.id}','${todo.id}')"></div>
        <div class="todo-text ${todo.done?'done':''}"
          contenteditable="true"
          onblur="saveTodo('${p.id}','${todo.id}',this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        >${escHtml(todo.text)}</div>
        <button class="icon-btn del todo-del" onclick="deleteTodo('${p.id}','${todo.id}'); event.stopPropagation();" title="${escAttr(t('deleteTodo'))}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`).join('')
    : `<div class="todo-empty">${escHtml(t('todoEmpty'))}</div>`;

  return `
  <div class="card" id="card-${p.id}">
    <div class="card-accent${full?' full':''}"></div>
    <div class="card-head">
      <div class="card-title-wrap">
        <input class="card-name" value="${escAttr(p.name)}" placeholder="${escAttr(t('projectName'))}"
          onblur="renameProject('${p.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()" />
        <div class="card-meta">${formatDate(p.createdAt)}</div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" onclick="exportProjectMd('${p.id}'); event.stopPropagation();" title="${escAttr(t('export'))}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <div class="more-wrap">
          <button class="icon-btn" onclick="toggleMore('${p.id}', event)" title="${escAttr(t('more'))}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
          <div class="more-menu" id="more-${p.id}" onclick="event.stopPropagation()">
            <button class="more-item danger" onclick="deleteProject('${p.id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              ${escHtml(t('deleteProject'))}
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="card-progress">
      <div class="prog-row">
        <span class="prog-counts">${escHtml(t('completedCount', done, total))}</span>
        <span class="prog-pct${full?' done-all':''}">${full ? t('allDone') : pp + '%'}</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill${full?' done-all':''}" style="width:${pp}%"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="card-todos" id="todos-${p.id}">${todos}</div>

    <div class="card-add">
      <input class="add-input" id="inp-${p.id}" placeholder="${escAttr(t('addTodoPlaceholder'))}" maxlength="200"
        onkeydown="if(event.key==='Enter')addTodo('${p.id}')" />
      <button class="add-btn" onclick="addTodo('${p.id}')" title="${escAttr(t('add'))}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>`;
}

function addCardHtml() {
  return `<div class="add-card" onclick="openModal()">
    <div class="add-card-icon">＋</div>
    <span>${escHtml(t('addProject'))}</span>
  </div>`;
}

function toggleMore(pid, event) {
  event.stopPropagation();
  const menu = document.getElementById('more-' + pid);
  const isOpen = menu.classList.contains('open');
  closeMenus();
  if (!isOpen) menu.classList.add('open');
}

document.addEventListener('click', () => closeMenus());

function renameProject(pid, val) {
  const p = state.projects.find(x => x.id === pid);
  if (!p || !val.trim()) { if(p) { const el=document.getElementById('card-'+pid); if(el)el.querySelector('.card-name').value=p.name; } return; }
  p.name = val.trim();
  save();
  renderBadge();
}

function deleteProject(pid) {
  if (!confirm(t('confirmDeleteProject'))) return;
  state.projects = state.projects.filter(x => x.id !== pid);
  resequence();
  save();
  render();
  toast(t('toastProjectDeleted'));
}

function addTodo(pid) {
  const inp = document.getElementById('inp-' + pid);
  const text = inp.value.trim();
  if (!text) return;
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  p.todos.push({ id: uid(), text, done: false, createdAt: new Date().toISOString() });
  save();
  inp.value = '';
  patchCard(pid);
  requestAnimationFrame(() => { const ni = document.getElementById('inp-' + pid); if (ni) ni.focus(); });
}

function toggleTodo(pid, tid) {
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  const t = p.todos.find(x => x.id === tid);
  if (!t) return;
  t.done = !t.done;
  save();
  patchCard(pid);
}

function deleteTodo(pid, tid) {
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  p.todos = p.todos.filter(x => x.id !== tid);
  save();
  patchCard(pid);
}

function saveTodo(pid, tid, el) {
  const text = el.innerText.trim();
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  const t = p.todos.find(x => x.id === tid);
  if (!t) return;
  if (!text) { el.innerText = t.text; return; }
  t.text = text;
  save();
}

function openModal() {
  closeMenus();
  document.getElementById('modalOverlay').classList.remove('hidden');
  requestAnimationFrame(() => document.getElementById('newName').focus());
}
function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('newName').value = '';
}
function confirmModal() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  state.projects.push({ id: uid(), name, todos: [], createdAt: new Date().toISOString(), order: state.projects.length });
  resequence();
  save();
  closeModal();
  render();
  toast(t('toastProjectCreated'), true);
}

function exportMd() {
  if (!state.projects.length) { toast(t('toastNoProjects')); return; }
  const locale = t('dateLocale');
  const lines = ['# ' + t('mdTitle'), '', `> ${t('mdExportedAt')}${new Date().toLocaleString(locale)}`, ''];
  sortedProjects().forEach(p => {
    const done = p.todos.filter(t=>t.done).length;
    const total = p.todos.length;
    const pp = total ? Math.round(done/total*100) : 0;
    lines.push(`## ${p.name}`);
    lines.push('');
    lines.push(`**${t('mdProgress')}** ${done}/${total} (${pp}%)  ${'█'.repeat(Math.round(pp/10))}${'░'.repeat(10-Math.round(pp/10))}`);
    lines.push('');
    if (p.todos.length) p.todos.forEach(t => lines.push(`- [${t.done?'x':' '}] ${t.text}`));
    else lines.push(`_${t('mdNoTodos')}_`);
    lines.push('');
  });
  downloadText(lines.join('\n'), `kanban-${new Date().toISOString().slice(0,10)}.md`, 'text/markdown;charset=utf-8');
  toast(t('toastExported'), true);
}

function exportProjectMd(pid) {
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  const done = p.todos.filter(t=>t.done).length;
  const total = p.todos.length;
  const pp = total ? Math.round(done/total*100) : 0;
  const locale = t('dateLocale');
  const lines = [`# ${p.name}`, '', `> ${t('mdExportedAt')}${new Date().toLocaleString(locale)}`, '', `**${t('mdProgress')}** ${done}/${total} (${pp}%)  ${'█'.repeat(Math.round(pp/10))}${'░'.repeat(10-Math.round(pp/10))}`, ''];
  if (p.todos.length) p.todos.forEach(t => lines.push(`- [${t.done?'x':' '}] ${t.text}`));
  else lines.push(`_${t('mdNoTodos')}_`);
  downloadText(lines.join('\n'), `${slugify(p.name)}-${new Date().toISOString().slice(0,10)}.md`, 'text/markdown;charset=utf-8');
  toast(t('toastProjectExported'), true);
}

function downloadText(text, filename, type) {
  const blob = new Blob([text], { type });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function slugify(text) {
  return String(text).trim().toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-+|-+$/g, '') || 'project';
}

function toast(msg, ok = false) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast' + (ok ? ' ok' : '');
  el.innerHTML = `<span>${ok ? '✓' : 'ℹ'}</span><span>${escHtml(msg)}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.style.transition='opacity 0.2s'; el.style.opacity='0'; setTimeout(()=>el.remove(), 200); }, 2600);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString(t('dateLocale'), { year:'numeric', month:'short', day:'numeric' }) : ''; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('modalOverlay').classList.contains('hidden')) closeModal();
});

updateStaticText();
render();
</script>
</body>
</html>
