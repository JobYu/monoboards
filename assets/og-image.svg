<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1118"/>
      <stop offset="100%" stop-color="#161922"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a8df5"/>
      <stop offset="100%" stop-color="#a07cf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a8df5"/>
      <stop offset="50%" stop-color="#a07cf8"/>
      <stop offset="100%" stop-color="#6a8df5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(106,141,245,0.15)"/>
      <stop offset="100%" stop-color="rgba(106,141,245,0)"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰性网格 -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 光晕 -->
  <ellipse cx="600" cy="280" rx="350" ry="200" fill="url(#glow)"/>

  <!-- Logo 背景圆角方块 -->
  <rect x="540" y="155" width="120" height="120" rx="28" fill="url(#accent)"/>

  <!-- Logo "M" -->
  <text x="600" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-2">M</text>

  <!-- 品牌名 -->
  <text x="600" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="56" font-weight="600" fill="#e4e7f5" text-anchor="middle" letter-spacing="-1">monoboards</text>

  <!-- 装饰线 -->
  <line x1="480" y1="405" x2="720" y2="405" stroke="url(#accent2)" stroke-width="2" stroke-linecap="round"/>

  <!-- 标语 -->
  <text x="600" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="22" font-weight="400" fill="#6e779a" text-anchor="middle" letter-spacing="0.5">Offline Project Kanban</text>
</svg>