  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --bg: #0e1118; --surface: #161922; --surface2: #1e2230; --border: rgba(255,255,255,0.06);

      --radius: 14px; --radius-sm: 9px;
    }
    html, body { min-height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .header { position: sticky; top: 0; z-index: 50; background: rgba(14,17,24,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #6a8df5 0%, #a07cf8 100%); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.5px; flex-shrink: 0; }
    .header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s ease; white-space: nowrap; font-family: inherit; text-decoration: none; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .lang-wrap { position: relative; }
    .lang-btn { gap: 4px; padding: 6px 10px; font-size: 12px; }
    .lang-menu { position: absolute; right: 0; top: 38px; z-index: 60; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); min-width: 130px; padding: 6px; display: none; }
    .lang-menu.open { display: block; }
    .lang-item { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: transparent; border: none; color: var(--text); cursor: pointer; font-family: inherit; font-size: 13px; text-align: left; }
    .lang-item:hover { background: var(--surface2); }
    .lang-item.active { color: var(--accent); }
    .main { flex: 1; max-width: 720px; margin: 0 auto; padding: 48px 28px; width: 100%; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    h2 { font-size: 16px; font-weight: 600; margin-top: 28px; margin-bottom: 12px; color: var(--accent); }
    p { font-size: 14px; line-height: 1.7; color: var(--text-muted); margin-bottom: 12px; }
    ul { margin-left: 20px; margin-bottom: 16px; }
    li { font-size: 14px; line-height: 1.7; color: var(--text-muted); margin-bottom: 6px; }
    strong { color: var(--text); font-weight: 600; }
    .highlight { background: var(--accent-soft); border-left: 3px solid var(--accent); padding: 14px 18px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin: 20px 0; }
    .highlight p { margin: 0; color: var(--text); }
    .footer { border-top: 1px solid var(--border); padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; gap: 8px; }
    .footer-links { display: flex; gap: 18px; }

    @media (max-width: 580px) { .header { padding: 0 16px; } .main { padding: 32px 16px; } h1 { font-size: 20px; } .footer { padding: 14px 16px; flex-direction: column; text-align: center; } }

const LANG_NAMES = { 'zh-TW': '繁體中文', 'zh-CN': '简体中文', 'en': 'English' };

function detectLang() {
  const saved = localStorage.getItem('monoboards-lang');
  if (saved && I18N[saved]) return saved;
  const nav = navigator.language || navigator.userLanguage || 'zh-TW';
  if (nav.startsWith('zh-TW') || nav.startsWith('zh-HK')) return 'zh-TW';
  if (nav.startsWith('zh')) return 'zh-CN';
  if (nav.startsWith('en')) return 'en';
  return 'zh-TW';
}

let currentLang = detectLang();
document.documentElement.lang = currentLang === 'en' ? 'en' : currentLang;

function t(key) {
  return (I18N[currentLang] && I18N[currentLang][key]) || I18N['zh-TW'][key] || key;
}

function setLang(lang) {
  if (!I18N[lang]) return;
  currentLang = lang;
  localStorage.setItem('monoboards-lang', lang);
  document.documentElement.lang = lang === 'en' ? 'en' : lang;
  closeLangMenu();
  renderContent();
}

function toggleLangMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('langMenu');
  const isOpen = menu.classList.contains('open');
  closeMenus();
  if (!isOpen) menu.classList.add('open');
}

function closeLangMenu() {
  document.getElementById('langMenu').classList.remove('open');
}

function closeMenus() {
  closeLangMenu();
}

document.addEventListener('click', () => closeMenus());

function renderContent() {
  document.getElementById('langLabel').textContent = LANG_NAMES[currentLang];
  document.getElementById('backBtn').textContent = t('backToApp');
  document.getElementById('footerHome').textContent = t('home');
  document.getElementById('footerPrivacy').textContent = t('privacy');

  document.querySelectorAll('.lang-item').forEach(el => el.classList.remove('active'));
  const active = document.getElementById('lang-' + currentLang);
  if (active) active.classList.add('active');

  document.getElementById('content').innerHTML = `
    <h1>${t('title')}</h1>
    <p class="subtitle">${t('subtitle')}</p>

    <div class="highlight">
      <p>${t('highlight')}</p>
    </div>

    <h2>${t('s1Title')}</h2>
    <p>${t('s1P1')}</p>

    <h2>${t('s2Title')}</h2>
    <p>${t('s2P1')}</p>
    <ul>
      <li>${t('s2L1')}</li>
      <li>${t('s2L2')}</li>
      <li>${t('s2L3')}</li>
    </ul>

    <h2>${t('s3Title')}</h2>
    <p>${t('s3P1')}</p>
    <ul>
      <li>${t('s3L1')}</li>
      <li>${t('s3L2')}</li>
      <li>${t('s3L3')}</li>
      <li>${t('s3L4')}</li>
    </ul>

    <h2>${t('s4Title')}</h2>
    <p>${t('s4P1')}</p>
    <ul>
      <li>${t('s4L1')}</li>
      <li>${t('s4L2')}</li>
      <li>${t('s4L3')}</li>
      <li>${t('s4L4')}</li>
    </ul>
    <p>${t('s4P2')}</p>

    <h2>${t('s5Title')}</h2>
    <p>${t('s5P1')}</p>

    <h2>${t('s6Title')}</h2>
    <p>${t('s6P1')}</p>

    <h2>${t('s7Title')}</h2>
    <p>${t('s7P1')}</p>

    <h2>${t('s8Title')}</h2>

}
